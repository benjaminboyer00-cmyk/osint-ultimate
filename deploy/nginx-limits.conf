# Snippet à inclure dans le bloc http {} de /etc/nginx/nginx.conf (une seule fois) :
#
#   include /opt/osint-ultimate/deploy/nginx-limits.conf;
#
# Puis décommenter limit_req dans deploy/nginx.conf (location /).

limit_req_zone $binary_remote_addr zone=osint_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=osint_conn:10m;
