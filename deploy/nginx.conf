# OSINT Ultimate — Nginx reverse proxy (production VPS)
# Copier vers /etc/nginx/sites-available/osint-ultimate
# puis : sudo ln -s .../osint-ultimate /etc/nginx/sites-enabled/
#        sudo certbot --nginx -d VOTRE_DOMAINE
#
# Remplacer osint.example.com par votre domaine.

# Limite de débit (zone partagée — ajouter dans http {} de nginx.conf principal si absent)
# limit_req_zone $binary_remote_addr zone=osint_limit:10m rate=10r/s;

upstream osint_app {
    server 127.0.0.1:7860;
    keepalive 32;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name osint.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name osint.example.com;

    # Certificats Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/osint.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/osint.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Sécurité
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 20M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    # Compression (complète Flask-Compress côté app)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Fichiers statiques servis par Flask (option : décommenter si volume monté)
    # location /static/ {
    #     alias /opt/osint-ultimate/static/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

  # limit_req zone=osint_limit burst=20 nodelay;

    location /socket.io/ {
        proxy_pass http://osint_app/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://osint_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /health {
        proxy_pass http://osint_app/health;
        access_log off;
    }
}
