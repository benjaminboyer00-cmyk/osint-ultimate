# OSINT Ultimate — Nginx reverse proxy (production VPS)
# Copier vers /etc/nginx/sites-available/osint-ultimate
# puis : sudo ln -s .../osint-ultimate /etc/nginx/sites-enabled/
#        sudo certbot --nginx -d VOTRE_DOMAINE
#
# Remplacer osint.example.com par votre domaine.

# Limite de débit : inclure deploy/nginx-limits.conf dans http {} du nginx principal,
# puis décommenter les deux lignes limit_* ci-dessous dans location /.

upstream osint_app {
    # HA : retire l'upstream 10s après 3 échecs consécutifs
    server 127.0.0.1:7860 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name osint.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name osint.example.com;

    # Certificats Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/osint.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/osint.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Sécurité
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 20M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    # Compression (complète Flask-Compress côté app)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml application/manifest+json
               text/xml application/xml font/woff2;

    # Statiques servis directement par Nginx (recommandé : décharge l'app).
    # Les URLs sont versionnées (?v=<mtime>) -> cache immutable 1 an sûr.
    # Décommenter et ajuster le chemin `alias` à votre déploiement.
    # location /static/ {
    #     alias /opt/osint-ultimate/static/;
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    #     access_log off;
    #     try_files $uri @app;   # repli vers l'app si le fichier manque
    # }
    # location @app { proxy_pass http://osint_app; }

    # limit_req zone=osint_limit burst=20 nodelay;
    # limit_conn osint_conn 30;

    location /socket.io/ {
        proxy_read_timeout 300s;
        proxy_pass http://osint_app/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://osint_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /health {
        proxy_pass http://osint_app/health;
        access_log off;
    }
}
