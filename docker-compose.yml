# Stack locale / VPS — web + worker Celery + Redis (DB = Supabase externe)
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    image: ${WEB_IMAGE:-osint-ultimate:local}
    build: .
    ports:
      - "${PORT:-7860}:7860"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      RATELIMIT_STORAGE_URI: redis://redis:6379/1
      USE_CELERY: "1"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    volumes:
      - uploads_data:/code/uploads
      - app_logs:/code/logs
    depends_on:
      - redis
    restart: unless-stopped
    command: /code/entrypoint.sh

  worker:
    image: ${WEB_IMAGE:-osint-ultimate:local}
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "1"
    volumes:
      - uploads_data:/code/uploads
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=2

  beat:
    image: ${WEB_IMAGE:-osint-ultimate:local}
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY_BEAT: "1"
    depends_on:
      - redis
    command: celery -A celery_app.celery_app beat --loglevel=info

volumes:
  redis_data:
  uploads_data:
  app_logs:
