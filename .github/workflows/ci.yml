name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt pytest pytest-cov safety
      - run: python -m compileall -q services routes connectors scan_modules.py app.py models.py
      - run: python -c "from services.report_consolidate import extract_technical_facts; from services.cache_manager import cache_get; from services.async_tasks import get_job"
      - name: Safety (dépendances)
        run: safety check -r requirements.txt --continue-on-error || true
      - run: python -m pytest tests/ -q --tb=short --cov=services --cov=routes --cov-report=term-missing:skip-covered --cov-fail-under=0
      - name: Docker compose syntax
        run: docker compose config > /dev/null
