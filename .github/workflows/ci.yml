name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt pytest
      - run: python -m compileall -q services routes connectors scan_modules.py app.py models.py
      - run: python -c "from services.report_consolidate import extract_technical_facts"
      - run: python -m pytest tests/ -q --tb=short
