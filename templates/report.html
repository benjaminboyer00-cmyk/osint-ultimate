<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rapport OSINT #{{ scan.id }}</title>
    <style>
        body { font-family: sans-serif; font-size: 12px; color: #222; margin: 2cm; }
        h1 { font-size: 18px; color: #006644; }
        h2 { font-size: 14px; margin-top: 1.2em; border-bottom: 1px solid #ccc; }
        .meta { color: #666; margin-bottom: 1.5em; }
        pre { background: #f5f5f5; padding: 8px; white-space: pre-wrap; word-break: break-all; }
        .kv { margin: 4px 0; }
        .k { font-weight: bold; color: #444; }
    </style>
</head>
<body>
    <h1>Rapport OSINT Ultimate</h1>
    <p class="meta">
        Module : <strong>{{ scan.module }}</strong><br>
        Cible : <strong>{{ scan.target }}</strong><br>
        Date : {{ scan.timestamp.strftime('%d/%m/%Y %H:%M UTC') if scan.timestamp else '—' }}
    </p>
    {% for section, content in data.items() %}
    <h2>{{ section }}</h2>
    <pre>{{ content | tojson(indent=2) }}</pre>
    {% endfor %}
</body>
</html>
