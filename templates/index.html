<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Ultimate V3.0</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        :root {
            --bg: #07080f;
            --panel: rgba(14, 17, 28, 0.85);
            --text: #c8cfe8;
            --text-dim: #5a6180;
            --accent: #00e5a0;
            --accent2: #4d9fff;
            --accent3: #ff6b9d;
            --error: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
            --border: rgba(255,255,255,0.07);
            --border-lit: rgba(0,229,160,0.25);
            --shadow: 0 24px 48px rgba(0,0,0,0.6);
            --glass: blur(20px) saturate(160%);
            --r: 14px;
            --tr: 0.2s cubic-bezier(.4,0,.2,1);
        }
        body.light {
            --bg: #eef2f9;
            --panel: rgba(255,255,255,0.85);
            --text: #1a2035;
            --text-dim: #8090b0;
            --accent: #00a878;
            --accent2: #0066dd;
            --border: rgba(0,0,0,0.07);
            --shadow: 0 12px 40px rgba(0,0,0,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 1.5rem 1rem 4rem;
            transition: background var(--tr), color var(--tr);
            overflow-x: hidden;
        }
        /* ── Particle canvas ── */
        canvas#bg {
            position: fixed; top:0; left:0;
            width:100%; height:100%;
            z-index:0; pointer-events:none; opacity:.35;
        }
        body.light canvas#bg { opacity:.12; }

        /* ── Layout ── */
        .wrap {
            position: relative; z-index:1;
            max-width: 960px; width:100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem 2.5rem;
            box-shadow: var(--shadow);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
        }

        /* ── Header ── */
        .hdr {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem; flex-wrap: wrap; gap: .8rem;
        }
        .logo {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: -1px;
        }
        .hdr-right { display:flex; gap:.7rem; align-items:center; flex-wrap: wrap; }
        .auth-btn {
            padding: .38rem 1.1rem; border-radius: 30px; font-size: .82rem;
            font-weight:600; text-decoration:none; border:1.5px solid var(--accent);
            color: var(--accent); background: transparent;
            transition: all var(--tr); white-space: nowrap;
        }
        .auth-btn:hover { background: var(--accent); color:#000; }
        .user-badge { font-size:.82rem; color: var(--text-dim); }
        .history-link {
            padding: .38rem 1.1rem; border-radius: 30px; font-size: .82rem;
            font-weight:600; text-decoration:none; border:1.5px solid var(--accent2);
            color: var(--accent2); background: transparent; transition: all var(--tr);
        }
        .history-link:hover { background: var(--accent2); color:#fff; }

        /* ── Theme toggle ── */
        .tog {
            width:46px; height:24px;
            background: rgba(255,255,255,.08);
            border:1px solid var(--border); border-radius:30px;
            position:relative; cursor:pointer;
            flex-shrink:0; transition: background var(--tr);
        }
        .tog::after {
            content:''; width:18px; height:18px;
            background: var(--accent); border-radius:50%;
            position:absolute; top:2px; left:2px;
            transition: transform .3s ease;
        }
        body.light .tog::after { transform: translateX(22px); }

        /* ── Module buttons ── */
        .modules {
            display:flex; flex-wrap:wrap; gap:.45rem; margin-bottom:1.5rem;
        }
        .mod {
            padding: .42rem .95rem; border-radius:30px; cursor:pointer;
            font-weight:600; font-size:.82rem; border:1.5px solid var(--border);
            background: rgba(255,255,255,.04); color: var(--text);
            transition: all var(--tr); white-space:nowrap;
        }
        .mod.active {
            background: var(--accent); color:#000;
            border-color: var(--accent);
            box-shadow: 0 0 18px rgba(0,229,160,.35);
        }
        .mod:hover:not(.active) {
            border-color: var(--accent2); background: rgba(77,159,255,.1);
        }

        /* ── Input area ── */
        .input-row {
            display:flex; gap:.8rem; margin-bottom:1.2rem; flex-wrap:wrap;
        }
        #target {
            flex:1 1 260px; padding:.85rem 1.3rem;
            background: rgba(255,255,255,.04);
            border:1.5px solid var(--border); border-radius:40px;
            color: var(--text); font-size:1rem;
            font-family:'Inter',sans-serif;
            transition: all var(--tr);
        }
        #target::placeholder { color: var(--text-dim); }
        #target:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,160,.15); }
        #scan-btn {
            background: var(--accent); border:none; color:#000;
            padding:.85rem 2.2rem; border-radius:40px;
            font-weight:700; font-size:.95rem; cursor:pointer;
            letter-spacing:.5px; text-transform:uppercase;
            box-shadow: 0 0 20px rgba(0,229,160,.4);
            transition: all var(--tr); flex-shrink:0;
        }
        #scan-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 4px 24px rgba(0,229,160,.5); }
        #scan-btn:disabled { opacity:.45; box-shadow:none; cursor:not-allowed; }

        /* ── Email options ── */
        .email-opts {
            display:none; flex-wrap:wrap; gap:.8rem;
            padding:1rem 1.2rem; margin-bottom:1.2rem;
            background: rgba(255,255,255,.03); border:1px solid var(--border);
            border-radius:var(--r);
        }
        .email-opts label {
            display:flex; align-items:center; gap:.4rem;
            cursor:pointer; font-size:.85rem;
        }
        .email-opts input[type=checkbox] { accent-color: var(--accent); }

        /* ── Progress ── */
        .prog-wrap {
            display:none; width:100%; height:5px;
            background: rgba(255,255,255,.07); border-radius:10px;
            margin-bottom:1.2rem; overflow:hidden;
        }
        .prog-bar {
            height:100%; width:0%; border-radius:10px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .4s ease;
            box-shadow: 0 0 10px var(--accent);
        }

        /* ── Result box ── */
        .result-box {
            background: rgba(0,0,0,.25);
            border:1px solid var(--border);
            border-radius:var(--r); padding:1.4rem;
            min-height:180px;
        }
        .result-box.has-error { border-color: var(--error); }
        .skeleton {
            height:18px; border-radius:6px; margin:.5rem 0;
            background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.05) 75%);
            background-size:200% 100%;
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        .result-placeholder {
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; height:140px; gap:.5rem;
            color: var(--text-dim); font-size:.9rem;
        }
        .result-placeholder .ico { font-size:2.5rem; opacity:.4; }

        /* ── Accordion ── */
        .acc-item { border-bottom:1px solid var(--border); }
        .acc-item:last-child { border-bottom:none; }
        .acc-hdr {
            padding:.75rem .5rem; font-weight:700; font-size:.9rem;
            cursor:pointer; display:flex; align-items:center; gap:.5rem;
            transition: color var(--tr);
            user-select:none;
        }
        .acc-hdr:hover { color: var(--accent); }
        .acc-hdr .chevron { margin-left:auto; transition: transform .25s; font-size:.75rem; color: var(--text-dim); }
        .acc-hdr.open .chevron { transform: rotate(180deg); }
        .acc-body { display:none; padding:.5rem .5rem 1rem 1rem; font-size:.88rem; line-height:1.7; }
        .acc-body.show { display:block; }
        .acc-body .kv { display:flex; gap:.5rem; margin:.2rem 0; flex-wrap:wrap; }
        .acc-body .k { color: var(--text-dim); font-size:.82rem; min-width:140px; }
        .acc-body .v { color: var(--text); word-break:break-all; }
        .acc-body ul { padding-left:1.2rem; }
        .acc-body li { margin:.15rem 0; }

        /* ── Badges ── */
        .badge {
            display:inline-block; padding:.15em .55em; border-radius:20px;
            font-size:.72rem; font-weight:700; white-space:nowrap;
        }
        .b-ok  { background:rgba(0,229,160,.15); color:var(--accent); }
        .b-err { background:rgba(255,71,87,.15);  color:var(--error); }
        .b-warn{ background:rgba(255,165,2,.15);  color:var(--warning); }
        .b-info{ background:rgba(77,159,255,.15); color:var(--accent2); }

        /* ── AI box ── */
        .ai-box {
            display:none; margin-top:1.2rem;
            background: rgba(77,159,255,.06);
            border:1px solid rgba(77,159,255,.2);
            border-radius:var(--r); padding:1rem 1.2rem;
        }
        .ai-btn {
            background: transparent; border:1.5px solid var(--accent2);
            color: var(--accent2); padding:.4rem 1rem; border-radius:20px;
            font-size:.82rem; font-weight:600; cursor:pointer;
            transition: all var(--tr);
        }
        .ai-btn:hover { background: var(--accent2); color:#fff; }
        #ai-text { margin-top:.7rem; font-size:.88rem; line-height:1.7; font-style:italic; white-space:pre-wrap; }

        /* ── Export bar ── */
        .export-bar {
            display:none; justify-content:flex-end;
            gap:.5rem; margin-top:1rem;
        }
        .icon-btn {
            background: rgba(255,255,255,.07); border:1px solid var(--border);
            color: var(--text); padding:.45rem .9rem; border-radius:8px;
            cursor:pointer; font-size:.82rem; transition: all var(--tr);
        }
        .icon-btn:hover { background: rgba(255,255,255,.14); }

        /* ── Map ── */
        #map { display:none; height:240px; border-radius:var(--r); margin-top:1.2rem; }

        /* ── Chart ── */
        .chart-wrap { display:none; width:260px; height:260px; margin:1rem auto; }

        /* ── Upload ── */
        .upload-area {
            margin-top:1.4rem; border:2px dashed var(--border);
            border-radius:var(--r); padding:.9rem 1rem;
            text-align:center; cursor:pointer; font-size:.85rem;
            color: var(--text-dim); transition: border-color var(--tr), color var(--tr);
        }
        .upload-area:hover { border-color: var(--accent); color: var(--text); }

        /* ── Responsive ── */
        @media(max-width:600px){
            .wrap { padding:1.4rem 1rem; }
            .logo { font-size:1.4rem; }
            #scan-btn { width:100%; }
            .input-row { flex-direction:column; }
            .hdr-right { justify-content:center; }
        }
    </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">

    <!-- Header -->
    <div class="hdr">
        <div class="logo">⚡ OSINT ULTIMATE V3</div>
        <div class="hdr-right">
            {% if authenticated %}
                <span class="user-badge">👤 {{ username }}</span>
                <a href="/history" class="history-link">📋 Historique</a>
                <a href="/logout" class="auth-btn">Déconnexion</a>
            {% else %}
                <a href="/login" class="auth-btn">Connexion</a>
                <a href="/register" class="auth-btn">Inscription</a>
            {% endif %}
            <div class="tog" onclick="toggleTheme()" title="Changer le thème"></div>
        </div>
    </div>

    <!-- Module selector -->
    <div class="modules" id="modules">
        <button class="mod active" data-m="site">🌐 Site web</button>
        <button class="mod" data-m="email">✉️ Email</button>
        <button class="mod" data-m="phone">📞 Téléphone</button>
        <button class="mod" data-m="ip">🌍 Adresse IP</button>
        <button class="mod" data-m="pseudo">🔍 Pseudo</button>
        <button class="mod" data-m="instagram">📸 Instagram</button>
        <button class="mod" data-m="twitter">🐦 Twitter/X</button>
        <button class="mod" data-m="tiktok">🎵 TikTok</button>
        <button class="mod" data-m="github">🐙 GitHub</button>
        <button class="mod" data-m="facebook">📘 Facebook</button>
        <button class="mod" data-m="linkedin">🔗 LinkedIn</button>
        <button class="mod" data-m="snapchat">👻 Snapchat</button>
    </div>

    <!-- Input -->
    <div class="input-row">
        <input type="text" id="target" placeholder="ex: example.com" autocomplete="off" spellcheck="false">
        <button id="scan-btn" onclick="launchScan()">Scanner</button>
    </div>

    <!-- Email options -->
    <div id="email-opts" class="email-opts">
        <label><input type="checkbox" value="mx" checked> MX</label>
        <label><input type="checkbox" value="spf" checked> SPF/DMARC</label>
        <label><input type="checkbox" value="smtp"> Vérif. SMTP</label>
        <label><input type="checkbox" value="breaches"> Fuites HIBP</label>
        <label><input type="checkbox" value="gravatar"> Gravatar</label>
    </div>

    <!-- Progress -->
    <div id="prog-wrap" class="prog-wrap"><div id="prog-bar" class="prog-bar"></div></div>

    <!-- Results -->
    <div id="result" class="result-box">
        <div class="result-placeholder">
            <div class="ico">🔍</div>
            <div>Sélectionnez un module et entrez une cible</div>
        </div>
    </div>

    <!-- Export -->
    <div class="export-bar" id="export-bar">
        <button class="icon-btn" onclick="copyResults()">📋 Copier</button>
        <button class="icon-btn" onclick="downloadJSON()">💾 JSON</button>
        <button class="icon-btn" onclick="window.print()">🖨️ Imprimer</button>
    </div>

    <!-- AI Summary -->
    <div class="ai-box" id="ai-box">
        <button class="ai-btn" onclick="getAI()">🤖 Résumé IA</button>
        <div id="ai-text"></div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Chart (pseudo) -->
    <div class="chart-wrap" id="chart-wrap">
        <canvas id="pseudo-chart"></canvas>
    </div>

    <!-- File upload -->
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        📎 Analyser un fichier — EXIF (images), métadonnées PDF, DOCX
        <input type="file" id="file-input" style="display:none"
               accept=".jpg,.jpeg,.png,.pdf,.docx,.tiff,.bmp,.webp"
               onchange="uploadFile(this)">
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script>
// ── Particle canvas ──────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, pts = [];
const NPTSMAX = 70, CDIST = 140;
const mouse = {x:null,y:null};

function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Pt {
    constructor(){ this.reset(); }
    reset(){
        this.x=Math.random()*W; this.y=Math.random()*H;
        this.vx=(Math.random()-.5)*.5; this.vy=(Math.random()-.5)*.5;
        this.r=Math.random()*1.5+.5;
    }
    tick(){
        this.x+=this.vx; this.y+=this.vy;
        if(this.x<0||this.x>W) this.vx=-this.vx;
        if(this.y<0||this.y>H) this.vy=-this.vy;
        if(mouse.x){
            let dx=this.x-mouse.x,dy=this.y-mouse.y,d=Math.hypot(dx,dy);
            if(d<90){let f=(90-d)/90; this.x+=dx*f*.015; this.y+=dy*f*.015;}
        }
    }
    draw(){
        const c=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#00e5a0';
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle=c; ctx.fill();
    }
}
for(let i=0;i<NPTSMAX;i++) pts.push(new Pt());

function animate(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{p.tick();p.draw();});
    const c=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#00e5a0';
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.hypot(dx,dy);
        if(d<CDIST){
            ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
            ctx.strokeStyle=`rgba(0,229,160,${.6*(1-d/CDIST)})`; ctx.lineWidth=.5; ctx.stroke();
        }
    }
    requestAnimationFrame(animate);
}
animate();
document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
document.addEventListener('mouseleave',()=>{mouse.x=null;mouse.y=null;});

// ── Theme ──────────────────────────────────────────────────
function toggleTheme(){
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light')?'light':'dark');
}
if(localStorage.getItem('theme')==='light') document.body.classList.add('light');

// ── Module selection ───────────────────────────────────────
const mods = document.querySelectorAll('.mod');
const targetEl = document.getElementById('target');
const scanBtn = document.getElementById('scan-btn');
const resultEl = document.getElementById('result');
const emailOpts = document.getElementById('email-opts');
const exportBar = document.getElementById('export-bar');
const mapEl = document.getElementById('map');
const aiBox = document.getElementById('ai-box');
const progWrap = document.getElementById('prog-wrap');
const progBar = document.getElementById('prog-bar');
let currentModule = 'site';

const PLACEHOLDERS = {
    site:'ex: example.com ou https://example.com',
    email:'ex: contact@example.com',
    phone:'ex: +33 6 12 34 56 78',
    ip:'ex: 8.8.8.8',
    pseudo:'ex: pseudonyme',
    instagram:'ex: nom_utilisateur (sans @)',
    twitter:'ex: nom_utilisateur (sans @)',
    tiktok:'ex: nom_utilisateur (sans @)',
    github:'ex: nom_utilisateur',
    facebook:'ex: nom.utilisateur ou ID',
    linkedin:'ex: identifiant-profil',
    snapchat:'ex: nom_utilisateur',
};

mods.forEach(btn => btn.addEventListener('click', ()=>{
    mods.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentModule = btn.dataset.m;
    targetEl.placeholder = PLACEHOLDERS[currentModule] || '';
    emailOpts.style.display = currentModule==='email' ? 'flex' : 'none';
    resultEl.innerHTML = `<div class="result-placeholder"><div class="ico">🔍</div><div>Entrez une cible et cliquez sur Scanner</div></div>`;
    resultEl.classList.remove('has-error');
    exportBar.style.display = 'none';
    aiBox.style.display = 'none';
    mapEl.style.display = 'none';
    document.getElementById('chart-wrap').style.display = 'none';
    progWrap.style.display = 'none';
}));

// ── Socket.IO ──────────────────────────────────────────────
const socket = io({ transports: ['websocket','polling'] });
let activeScanId = null;
let scanRunning = false;
let lastResult = null;
let progressTimer = null;

socket.on('scan_done', ({ scan_id, result }) => {
    if(scan_id !== activeScanId) return;
    clearScanProgress();
    lastResult = result;
    renderResult(result);
    exportBar.style.display = 'flex';
    aiBox.style.display = 'block';
    // Map
    const geo = result.Géolocalisation || result['Géolocalisation IP'] || {};
    if(geo.Lat && geo.Lon) showMap(geo.Lat, geo.Lon);
    else mapEl.style.display = 'none';
});

socket.on('scan_error', ({ scan_id, error }) => {
    if(scan_id !== activeScanId) return;
    clearScanProgress();
    resultEl.innerHTML = `<p style="color:var(--error)">❌ ${error}</p>`;
    resultEl.classList.add('has-error');
});

// Fallback polling if socket misses event
function pollFallback(scan_id){
    const interval = setInterval(async ()=>{
        if(scan_id !== activeScanId){ clearInterval(interval); return; }
        try {
            const r = await fetch(`/scan/${scan_id}`);
            const d = await r.json();
            if(d.status !== 'pending' && d.status !== 'running'){
                clearInterval(interval);
                if(!scanRunning) return; // already handled by socket
                clearScanProgress();
                lastResult = d;
                renderResult(d);
                exportBar.style.display = 'flex';
                aiBox.style.display = 'block';
            }
        } catch(e){}
    }, 2000);
    setTimeout(()=>clearInterval(interval), 120000);
}

// ── Launch scan ────────────────────────────────────────────
async function launchScan(){
    const target = targetEl.value.trim();
    if(!target || scanRunning) return;
    scanRunning = true;
    activeScanId = null;
    lastResult = null;
    resultEl.classList.remove('has-error');
    resultEl.innerHTML = `<div class="skeleton" style="width:65%"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:45%"></div><div class="skeleton" style="width:70%"></div>`;
    exportBar.style.display = 'none';
    aiBox.style.display = 'none';
    mapEl.style.display = 'none';
    document.getElementById('chart-wrap').style.display = 'none';
    document.getElementById('ai-text').textContent = '';
    progWrap.style.display = 'block';
    progBar.style.width = '0%';
    scanBtn.disabled = true; scanBtn.textContent = 'Analyse…';

    let prog = 0;
    progressTimer = setInterval(()=>{
        prog = Math.min(prog + Math.random()*4 + 1, 88);
        progBar.style.width = prog + '%';
    }, 600);

    const opts = currentModule === 'email'
        ? [...document.querySelectorAll('#email-opts input:checked')].map(c=>c.value)
        : [];

    try {
        const resp = await fetch('/scan', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({module: currentModule, target, options: opts})
        });
        const data = await resp.json();
        if(data.scan_id){
            activeScanId = data.scan_id;
            pollFallback(data.scan_id);
        } else {
            clearScanProgress();
            resultEl.innerHTML = `<p style="color:var(--error)">❌ ${data.error||'Erreur inconnue'}</p>`;
            resultEl.classList.add('has-error');
        }
    } catch(e){
        clearScanProgress();
        resultEl.innerHTML = `<p style="color:var(--error)">⚠️ Erreur réseau: ${e.message}</p>`;
        resultEl.classList.add('has-error');
    }
}

function clearScanProgress(){
    scanRunning = false;
    clearInterval(progressTimer);
    progBar.style.width = '100%';
    setTimeout(()=>{ progWrap.style.display='none'; progBar.style.width='0%'; }, 800);
    scanBtn.disabled = false; scanBtn.textContent = 'Scanner';
}

targetEl.addEventListener('keydown', e=>{ if(e.key==='Enter') launchScan(); });

// ── Render results ─────────────────────────────────────────
let pseudoChartInst = null;

function renderResult(data){
    resultEl.classList.remove('has-error');
    if(!data || typeof data !== 'object'){
        resultEl.innerHTML = `<p>${data}</p>`; return;
    }
    if(data.error){
        resultEl.innerHTML = `<p style="color:var(--error)">❌ ${data.error}</p>`;
        resultEl.classList.add('has-error'); return;
    }

    let html = '';
    for(const [key, value] of Object.entries(data)){
        const badge = getBadge(key, value);
        html += `<div class="acc-item">
            <div class="acc-hdr" onclick="toggleAcc(this)">
                <span>${getIcon(key)} ${key}</span>${badge}
                <span class="chevron">▾</span>
            </div>
            <div class="acc-body">${renderValue(value)}</div>
        </div>`;
    }
    resultEl.innerHTML = `<div>${html}</div>`;
    // Open first
    const first = resultEl.querySelector('.acc-body');
    if(first){ first.classList.add('show'); resultEl.querySelector('.acc-hdr').classList.add('open'); }

    // Pseudo chart
    if(currentModule === 'pseudo'){
        let ok=0, nope=0;
        Object.values(data).forEach(v=>{ if(String(v).includes('Existe')) ok++; else nope++; });
        const wrap = document.getElementById('chart-wrap');
        wrap.style.display = 'block';
        if(pseudoChartInst){ pseudoChartInst.destroy(); pseudoChartInst=null; }
        pseudoChartInst = new Chart(document.getElementById('pseudo-chart').getContext('2d'),{
            type:'doughnut',
            data:{labels:['Trouvés','Non trouvés'],
                  datasets:[{data:[ok,nope],backgroundColor:['#00e5a0','#ff4757'],
                             borderWidth:0,hoverOffset:6}]},
            options:{plugins:{legend:{labels:{color:'#c8cfe8',font:{size:13}}}}}
        });
    } else {
        document.getElementById('chart-wrap').style.display = 'none';
    }
}

function toggleAcc(hdr){
    const body = hdr.nextElementSibling;
    body.classList.toggle('show');
    hdr.classList.toggle('open');
}

function getBadge(key, value){
    const s = String(value || '');
    if(s.includes('✓') || s === 'true' || s.includes('Valide') || s.includes('Existe'))
        return '<span class="badge b-ok">OK</span>';
    if(s.includes('❌') || s.includes('Erreur') || s.includes('Non trouvé') || s.includes('Absent'))
        return '<span class="badge b-err">—</span>';
    if(s.includes('⚠️') || s.includes('Proxy') || s.includes('Surtaxé'))
        return '<span class="badge b-warn">⚠</span>';
    return '';
}

function getIcon(key){
    const icons = {
        'WHOIS':'📄','DNS':'🔗','HTTP':'🌐','IP':'🖥️','Géolocalisation':'📍',
        'Ports ouverts':'🔓','Ports':'🔒','Technologies':'⚙️','SSL/TLS':'🔐',
        'En-têtes sécurité':'🛡️','Wayback Machine':'🕰️','Shodan':'👁️',
        'MX':'📬','SPF':'✅','DMARC':'📋','DKIM':'🔑','Gravatar':'🖼️',
        'Fuites (HIBP)':'💥','SMTP':'📧','Followers':'👥','Following':'👣',
        'Repos récents':'📦','GitHub':'🐙',
    };
    for(const [k, ico] of Object.entries(icons)){
        if(key.includes(k)) return ico;
    }
    return '▸';
}

function renderValue(val, depth=0){
    if(val === null || val === undefined) return '<span style="color:var(--text-dim)">N/A</span>';
    if(typeof val === 'object'){
        if(Array.isArray(val)){
            if(val.length === 0) return '<span style="color:var(--text-dim)">Vide</span>';
            // Array of objects → table-like
            if(typeof val[0] === 'object'){
                return val.map(item=>`<div style="margin:.4rem 0;padding:.5rem;background:rgba(255,255,255,.03);border-radius:8px">${renderValue(item,depth+1)}</div>`).join('');
            }
            return `<ul>${val.map(v=>`<li>${renderValue(v,depth+1)}</li>`).join('')}</ul>`;
        }
        let html='';
        for(const [k,v] of Object.entries(val)){
            html+=`<div class="kv"><span class="k">${k}:</span><span class="v">${renderValue(v,depth+1)}</span></div>`;
        }
        return html;
    }
    const s = String(val);
    if(s.startsWith('http')) return `<a href="${s}" target="_blank" rel="noopener" style="color:var(--accent2)">${s}</a>`;
    if(s.includes('⚠️')) return `<span style="color:var(--warning)">${s}</span>`;
    if(s.includes('✓')) return `<span style="color:var(--accent)">${s}</span>`;
    if(s.includes('❌') || s.toLowerCase().includes('erreur')) return `<span style="color:var(--error)">${s}</span>`;
    return s;
}

// ── Map ────────────────────────────────────────────────────
let leafletMap = null;
function showMap(lat, lon){
    mapEl.style.display = 'block';
    if(!leafletMap){
        leafletMap = L.map('map').setView([lat,lon],10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {attribution:'© OpenStreetMap contributors'}).addTo(leafletMap);
    } else {
        leafletMap.setView([lat,lon],10);
        leafletMap.eachLayer(l=>{ if(l instanceof L.Marker) leafletMap.removeLayer(l); });
    }
    L.marker([lat,lon]).addTo(leafletMap);
    setTimeout(()=>leafletMap.invalidateSize(),200);
}

// ── Upload ─────────────────────────────────────────────────
async function uploadFile(input){
    if(!input.files.length) return;
    const fd = new FormData();
    fd.append('file', input.files[0]);
    resultEl.innerHTML = `<div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:75%"></div>`;
    try {
        const r = await fetch('/upload',{method:'POST',body:fd});
        const d = await r.json();
        if(d.metadata){ renderResult(d.metadata); exportBar.style.display='flex'; }
        else resultEl.innerHTML = `<p style="color:var(--error)">Erreur: ${d.error||'Inconnue'}</p>`;
    } catch(e){
        resultEl.innerHTML = `<p style="color:var(--error)">Erreur upload: ${e.message}</p>`;
    }
    input.value='';
}

// ── AI Summary ─────────────────────────────────────────────
async function getAI(){
    const aiText = document.getElementById('ai-text');
    aiText.textContent = '⏳ Analyse en cours…';
    try {
        const r = await fetch('/ai-summary',{
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({result: lastResult})
        });
        const d = await r.json();
        aiText.textContent = d.summary || ('Erreur: ' + (d.error||'?'));
    } catch(e){
        aiText.textContent = `Erreur: ${e.message}`;
    }
}

// ── Export ─────────────────────────────────────────────────
function copyResults(){
    const text = resultEl.innerText;
    navigator.clipboard.writeText(text).then(()=>{
        const btn = event.target; btn.textContent='✓ Copié';
        setTimeout(()=>btn.textContent='📋 Copier',2000);
    });
}
function downloadJSON(){
    if(!lastResult) return;
    const blob = new Blob([JSON.stringify(lastResult,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`osint_${currentModule}_${Date.now()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
}

// ── PWA ────────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
