<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline OSINT – OSINT Ultimate</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <link href="{{ url_for('static', filename='vendor/vis/vis-timeline-graph2d.min.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/vendor/socket.io.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/socketio-client.js') }}"></script>
    <script src="{{ url_for('static', filename='js/runtime-banner.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/vis/vis-timeline-graph2d.min.js') }}"></script>
    <style>
        *{box-sizing:border-box}
        body{margin:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column}
        header{padding:.75rem 1rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;border-bottom:1px solid var(--border)}
        header a{color:var(--accent2);text-decoration:none;font-size:.85rem}
        .toolbar select, .toolbar button{
            padding:.45rem .85rem;background:#14171c;color:var(--text);
            border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.8rem;
        }
        #timeline-wrap{flex:1;min-height:280px;padding:.5rem}
        #timeline{height:100%;min-height:260px;background:#0d1018;border-radius:10px;border:1px solid var(--border)}
        aside{padding:.75rem 1rem;border-top:1px solid var(--border);font-size:.82rem;max-height:28vh;overflow-y:auto}
        #detail{color:var(--dim);margin-top:.4rem}
        .vis-timeline { border: none; font-family: inherit; }
        .vis-item.evt-scan { background: #1a3d32; border-color: #4d6d80; color: #e7ddc9; }
        .vis-item.evt-wayback { background: #2a2a4a; border-color: #4d6d80; color: #e7ddc9; }
        .vis-item.evt-breach { background: #4a2020; border-color: #a5342a; color: #ffe0e0; }
        .vis-item.evt-whois { background: #3d3520; border-color: #b8802f; color: #e7ddc9; }
        .vis-item.evt-entity, .vis-item.evt-root { background: #1e2433; border-color: #6d5b7a; }
        .vis-item.evt-link { background: #1a2530; border-color: #5a6180; }
        .vis-item.vis-selected { box-shadow: 0 0 0 2px var(--accent); }
    </style>
</head>
<body>
<header>
    <a href="{{ url_for('views.expert') }}">← Expert</a>
    <strong>Timeline</strong>
    <div class="toolbar">
        <select id="entity-select" onchange="loadTimeline(this.value)">
            <option value="">— Entité racine —</option>
            {% for e in entities %}
            <option value="{{ e.id }}" {% if entity_id == e.id %}selected{% endif %}>
                {{ e.entity_type }}: {{ e.value[:40] }}
            </option>
            {% endfor %}
        </select>
        <a href="{{ url_for('views.graph_view', entity_id=entity_id) if entity_id else url_for('views.graph_view') }}" id="graph-link" style="font-size:.85rem">Graphe</a>
        <a href="{{ url_for('views.map_view', entity_id=entity_id) if entity_id else url_for('views.map_view') }}" style="font-size:.85rem">Carte</a>
    </div>
</header>
<div id="timeline-wrap"><div id="timeline"></div></div>
<aside>
    <span id="status" style="color:var(--dim)">Sélectionnez une entité pour charger la frise chronologique.</span>
    <div id="detail"></div>
</aside>
<script>
let visTimeline = null;
let itemsDs = null;
let groupsDs = null;
let rootEntityId = {{ entity_id or 'null' }};

const tlSocket = typeof createOsintSocket === 'function' ? createOsintSocket() : null;
if (tlSocket) tlSocket.on('connect', () =>tlSocket.emit('join_timeline', {}));

function showDetail(item) {
    const el = document.getElementById('detail');
    if (!item) { el.innerHTML = ''; return; }
    let html = `<strong>${item.content}</strong><br><small>${item.start || ''}</small>`;
    if (item.title) html += `<br>${item.title}`;
    if (item.entity_id) {
        html += `<br><a href="/graph?entity_id=${rootEntityId || item.entity_id}&highlight=${item.entity_id}">Voir dans le graphe</a>`;
        html += ` · <a href="/expert/dossier/${item.entity_id}">Dossier</a>`;
    }
    if (item.scan_id) html += `<br><a href="/expert?scan_id=${item.scan_id}">Scan #${item.scan_id}</a>`;
    if (item.archive) html += `<br><a href="${item.archive}" target="_blank" rel="noopener">Archive Wayback</a>`;
    el.innerHTML = html;
}

function renderTimeline(data) {
    const container = document.getElementById('timeline');
    itemsDs = new vis.DataSet(data.items || []);
    groupsDs = new vis.DataSet(data.groups || []);
    const opts = {
        stack: true,
        showCurrentTime: true,
        zoomMin: 1000 * 60 * 60 * 24 * 7,
        zoomMax: 1000 * 60 * 60 * 24 * 365 * 30,
        orientation: 'top',
        margin: { item: 8 },
        tooltip: { followMouse: true, overflowMethod: 'cap' },
    };
    if (visTimeline) {
        visTimeline.setGroups(groupsDs);
        visTimeline.setItems(itemsDs);
    } else {
        visTimeline = new vis.Timeline(container, itemsDs, groupsDs, opts);
        visTimeline.on('select', props =>{
            if (!props.items.length) return showDetail(null);
            const item = itemsDs.get(props.items[0]);
            showDetail(item);
            if (item.entity_id) {
                window.open(`/graph?entity_id=${rootEntityId || item.entity_id}&highlight=${item.entity_id}`, '_blank');
            }
        });
    }
    if (data.items && data.items.length) {
        visTimeline.fit({ animation: { duration: 400 } });
    }
}

async function loadTimeline(entityId) {
    if (!entityId) return;
    rootEntityId = parseInt(entityId, 10);
    document.getElementById('graph-link').href = `/graph?entity_id=${rootEntityId}`;
    document.getElementById('status').textContent = ' Chargement…';
    try {
        const r = await fetch(`/timeline/data/${rootEntityId}`);
        const d = await r.json();
        if (!r.ok) {
            document.getElementById('status').textContent = ' ' + (d.error || 'Erreur');
            return;
        }
        renderTimeline(d);
        document.getElementById('status').textContent =
            `${d.count} événement(s) — ${d.root_value || ''}`;
    } catch (e) {
        document.getElementById('status').textContent = ' ' + e.message;
    }
}

tlSocket.on('timeline_update', payload =>{
    if (rootEntityId && payload.root_entity_id && payload.root_entity_id !== rootEntityId) return;
    if (payload.root_entity_id) rootEntityId = payload.root_entity_id;
    renderTimeline(payload);
    document.getElementById('status').textContent =
        ` Timeline mise à jour — ${payload.count || 0} événement(s)`;
});

{% if entity_id %}
loadTimeline('{{ entity_id }}');
{% endif %}
</script>
</body>
</html>
